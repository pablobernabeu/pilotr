# Dependency health: detect breakage from upstream dependency updates, try to resolve it
# automatically, and flag the maintainer if it can't be resolved.
#
# Stages:
#   1. detect   - run the R and Python test/example suites against the LATEST released
#                 versions of every dependency (no version pinning), on a schedule. This
#                 surfaces breaking changes shipped by CRAN/PyPI before they reach a user.
#   2. resolve  - on failure, attempt an automatic fix:
#                   * agentic (opt-in): if an ANTHROPIC_API_KEY secret is set, Claude Code
#                     investigates the failure, edits the code, and re-runs until green;
#                   * deterministic fallback (no key): regenerate roxygen docs/NAMESPACE.
#                 Any resulting change is proposed as a pull request (CI on the PR confirms
#                 whether it actually fixes the break).
#   3. flag     - always open/update a tracking issue assigned to the maintainer, linking
#                 the failed run and any auto-fix PR.
#
# To enable the agentic auto-fix, add an ANTHROPIC_API_KEY repository secret
# (Settings > Secrets and variables > Actions). Without it, stages 1 and 3 still run and
# the deterministic fallback is used in stage 2.

name: Dependency health

on:
  schedule:
    - cron: "0 6 */2 * *"   # every ~2 days at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dependency-health
  cancel-in-progress: false

jobs:
  r-deps:
    name: R suite (latest CRAN deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true   # fast binaries, tracking the latest released versions
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: r/pilotr
          dependencies: '"all"'   # Imports + Suggests (lme4, lmerTest, faux, shiny, callr, ...)
      - name: Smoke-test the engine and every key dependency
        run: |
          set -e
          Rscript r/pilotr/tests/test_app_logic.R      # engine + spec builder (asserts; exits 1 on failure)
          Rscript r/pilotr/tests/test_app_server.R     # Shiny app server + callr verify
          Rscript r/pilotr/examples/run_demo.R         # jsonlite + generative engine
          Rscript r/pilotr/examples/run_power_mixed.R  # lme4 / lmerTest crossed-LMM power
          Rscript r/pilotr/examples/equivalence_faux.R # faux equivalence

  python-deps:
    name: Python suite (latest PyPI deps)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install latest deps and run the suite
        working-directory: python
        run: |
          set -e
          python -m pip install --upgrade pip
          pip install ".[dev]"          # latest scipy + pytest
          pytest tests -q
          python examples/run_demo.py
          python examples/families_demo.py

  resolve-and-flag:
    name: Try to auto-resolve, then flag the maintainer
    needs: [r-deps, python-deps]
    if: ${{ always() && (needs.r-deps.result == 'failure' || needs.python-deps.result == 'failure') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Is the agentic auto-fix configured?
        id: cfg
        run: echo "have_key=${{ secrets.ANTHROPIC_API_KEY != '' }}" >> "$GITHUB_OUTPUT"

      # --- toolchains, so a fixer can actually run the failing suites (agentic path) ---
      - uses: r-lib/actions/setup-r@v2
        if: steps.cfg.outputs.have_key == 'true'
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        if: steps.cfg.outputs.have_key == 'true'
        with:
          working-directory: r/pilotr
          dependencies: '"all"'
          extra-packages: any::roxygen2
      - uses: actions/setup-python@v5
        if: steps.cfg.outputs.have_key == 'true'
        with:
          python-version: "3.12"

      - name: Agentic auto-fix (Claude Code)
        if: steps.cfg.outputs.have_key == 'true'
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            The scheduled dependency-health check is failing: pilotr's tests fail against the
            latest released versions of its dependencies. Diagnose and fix it.

            Reproduce the failures:
              R:   Rscript r/pilotr/tests/test_app_logic.R
                   Rscript r/pilotr/tests/test_app_server.R
                   Rscript r/pilotr/examples/run_demo.R
                   Rscript r/pilotr/examples/run_power_mixed.R
                   Rscript r/pilotr/examples/equivalence_faux.R
              Py:  cd python && pip install ".[dev]" && pytest tests -q

            Make the SMALLEST change that restores compatibility with the updated dependency
            (e.g. adapt to a renamed/changed function; only as a last resort, pin the offending
            dependency in r/pilotr/DESCRIPTION or python/pyproject.toml). Do NOT weaken, skip,
            or delete tests, and keep R<->Python bit-identical output intact. Re-run the
            commands until they pass. If you cannot fix it, leave the working tree unchanged.
          claude_args: |
            --max-turns 30
            --allowedTools Bash,Edit,Read,Write,Glob,Grep

      # --- deterministic fallback when no API key: safe regeneration of generated files ---
      - uses: r-lib/actions/setup-r@v2
        if: steps.cfg.outputs.have_key != 'true'
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        if: steps.cfg.outputs.have_key != 'true'
        with:
          working-directory: r/pilotr
          extra-packages: any::roxygen2
      - name: Regenerate R docs/NAMESPACE (safe best-effort)
        if: steps.cfg.outputs.have_key != 'true'
        continue-on-error: true
        shell: Rscript {0}
        run: roxygen2::roxygenise("r/pilotr")

      - name: Propose any auto-fix as a pull request
        id: pr
        if: always()
        continue-on-error: true
        uses: peter-evans/create-pull-request@v7
        with:
          branch: auto/dependency-remediation
          title: "Automated dependency remediation"
          commit-message: "fix: automated dependency remediation"
          body: |
            Automated attempt to resolve the failing scheduled **Dependency health** check.
            The checks on this PR show whether the change actually fixes the break — review
            before merging.
          labels: dependencies
          delete-branch: true

      - name: Flag the maintainer (open or update tracking issue)
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const marker = "<!-- dependency-health-tracker -->";
            const { owner, repo } = context.repo;
            const run = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const pr = `${{ steps.pr.outputs.pull-request-number || '' }}`;
            const prLine = pr
              ? `\n\nAn automated fix was attempted in #${pr} — review whether its checks pass.`
              : `\n\nNo automated fix could be applied; this needs manual attention.`;
            const body = `${marker}\n\nThe scheduled **Dependency health** check is failing — a dependency update has likely broken the package.\n\n- Failed run: ${run}${prLine}\n\n_This issue updates automatically on each failing run._`;
            const open = await github.rest.issues.listForRepo({ owner, repo, state: "open", per_page: 100 });
            const existing = open.data.find(i => i.body && i.body.includes(marker));
            if (existing) {
              await github.rest.issues.createComment({ owner, repo, issue_number: existing.number, body });
            } else {
              await github.rest.issues.create({
                owner, repo,
                title: "Dependency health check failing",
                body,
                assignees: ["pablobernabeu"],
              });
            }
