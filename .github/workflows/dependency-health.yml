# Dependency health: detect breakage from upstream dependency updates, triage it with a free
# AI model, and flag the maintainer. Runs entirely on free, native GitHub features --
# GitHub Actions is free for public repositories, and the triage uses GitHub Models (free,
# rate-limited) authenticated by the built-in GITHUB_TOKEN. No paid API key or external service.
#
# Stages:
#   1. detect - run the R and Python suites against the LATEST released CRAN/PyPI versions
#               (no pinning), so an upstream breaking change surfaces here, not for a user.
#   2. triage - on failure, ask a free GitHub Models model to diagnose the failure and suggest
#               the smallest fix, from the failed run's own logs.
#   3. flag   - open/update a tracking issue (assigned to the maintainer) with the run link and
#               the AI diagnosis; auto-close it when the checks pass again.
#
# Optional upgrade to a fully autonomous fix-and-open-PR loop (NOT free) is described in the
# commented block at the end of this file.

name: Dependency health

on:
  schedule:
    - cron: "0 6 */2 * *"   # every ~2 days at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dependency-health
  cancel-in-progress: false

jobs:
  r-deps:
    name: R suite (latest CRAN deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true   # fast binaries tracking the latest released versions
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: r/pilotr
          dependencies: '"all"'        # Imports + Suggests (lme4, lmerTest, shiny, callr, ...)
          extra-packages: any::faux    # equivalence_faux.R uses faux, a dev/CI dependency (not a package Suggests)
      - name: Smoke-test the engine and every key dependency
        run: |
          set -e
          Rscript r/pilotr/tests/test_app_logic.R      # engine + spec builder (asserts; exits 1 on failure)
          Rscript r/pilotr/tests/test_app_server.R     # Shiny app server + callr verify
          Rscript r/pilotr/examples/run_demo.R         # jsonlite + generative engine
          Rscript r/pilotr/examples/run_power_mixed.R  # lme4 / lmerTest crossed-LMM power
          Rscript r/pilotr/examples/equivalence_faux.R # faux equivalence

  python-deps:
    name: Python suite (latest PyPI deps)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install latest deps and run the suite
        working-directory: python
        run: |
          set -e
          python -m pip install --upgrade pip
          pip install ".[dev]"          # latest scipy + pytest
          pytest tests -q
          python examples/run_demo.py
          python examples/families_demo.py

  triage-and-flag:
    name: Triage with GitHub Models, then flag the maintainer
    needs: [r-deps, python-deps]
    if: ${{ always() && (needs.r-deps.result == 'failure' || needs.python-deps.result == 'failure') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      models: read   # free GitHub Models access via GITHUB_TOKEN
    steps:
      - uses: actions/checkout@v6

      - name: Collect the failing logs and config
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run view "$GITHUB_RUN_ID" --repo "$GITHUB_REPOSITORY" --log-failed > failure.log 2>&1 || true
          {
            echo "Failed dependency-health run for the pilotr package (R + Python)."
            echo
            echo "=== Last 200 lines of the failing logs ==="
            tail -n 200 failure.log
            echo
            echo "=== python/pyproject.toml ==="
            cat python/pyproject.toml
            echo
            echo "=== r/pilotr/DESCRIPTION ==="
            cat r/pilotr/DESCRIPTION
          } > triage-input.md

      - name: Diagnose with a free GitHub Models model
        id: ai
        continue-on-error: true
        uses: actions/ai-inference@v1
        with:
          model: openai/gpt-4o-mini
          system-prompt: >
            You maintain an R + Python package (pilotr). A scheduled CI job that runs the test
            suites against the latest released dependency versions has failed. From the logs and
            config provided, identify the single most likely root cause and propose the smallest
            concrete fix, naming the file and the change. Be concise: reply in GitHub-flavored
            Markdown under 250 words, with a "Likely cause" line and a "Suggested fix" section.
            Do not invent log lines.
          prompt-file: triage-input.md
          max-completion-tokens: "700"

      - name: Open or update the tracking issue
        uses: actions/github-script@v9
        env:
          AI_RESPONSE: ${{ steps.ai.outputs.response }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const marker = "<!-- dependency-health-tracker -->";
            const { owner, repo } = context.repo;
            const diagnosis = (process.env.AI_RESPONSE || "").trim();
            const aiBlock = diagnosis
              ? `\n\n---\n### Automated triage (GitHub Models)\n\n${diagnosis}`
              : `\n\n_(Automated triage was unavailable for this run.)_`;
            const body = `${marker}\n\nThe scheduled **Dependency health** check is failing — an upstream dependency update has likely broken the package.\n\n- Failed run: ${process.env.RUN_URL}${aiBlock}\n\n_This issue updates on each failing run and closes automatically when the checks pass again._`;
            const open = await github.rest.issues.listForRepo({ owner, repo, state: "open", per_page: 100 });
            const existing = open.data.find(i => i.body && i.body.includes(marker));
            if (existing) {
              await github.rest.issues.createComment({ owner, repo, issue_number: existing.number, body });
            } else {
              await github.rest.issues.create({ owner, repo, title: "Dependency health check failing", body, assignees: ["pablobernabeu"] });
            }

  close-on-success:
    name: Close the tracking issue when healthy
    needs: [r-deps, python-deps]
    if: ${{ needs.r-deps.result == 'success' && needs.python-deps.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const marker = "<!-- dependency-health-tracker -->";
            const { owner, repo } = context.repo;
            const open = await github.rest.issues.listForRepo({ owner, repo, state: "open", per_page: 100 });
            for (const i of open.data) {
              if (i.body && i.body.includes(marker)) {
                await github.rest.issues.createComment({ owner, repo, issue_number: i.number, body: "Dependency-health checks are passing again — closing automatically." });
                await github.rest.issues.update({ owner, repo, issue_number: i.number, state: "closed" });
              }
            }

# -----------------------------------------------------------------------------------------
