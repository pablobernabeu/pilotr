<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 346" width="300" height="346">
  <defs>
    <linearGradient id="hexbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3f82c4"/>
      <stop offset="1" stop-color="#1f4f7e"/>
    </linearGradient>
    <linearGradient id="area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.03"/>
    </linearGradient>
  </defs>

  <!-- hexagon (pointy-top, the R-sticker orientation) -->
  <polygon points="150,12 288,93 288,253 150,334 12,253 12,93"
           fill="url(#hexbg)" stroke="#14375a" stroke-width="11" stroke-linejoin="round"/>
  <polygon points="150,12 288,93 288,253 150,334 12,253 12,93"
           fill="none" stroke="#ffffff" stroke-opacity="0.16" stroke-width="3" stroke-linejoin="round"/>

  <!-- simulated density: area + outline, symmetric about x=150 -->
  <path d="M 62 236 C 96 236 112 132 150 132 C 188 132 204 236 238 236 Z" fill="url(#area)"/>
  <path d="M 62 236 C 96 236 112 132 150 132 C 188 132 204 236 238 236"
        fill="none" stroke="#ffffff" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- baseline -->
  <line x1="54" y1="236" x2="246" y2="236" stroke="#ffffff" stroke-opacity="0.5" stroke-width="3"/>

  <!-- effect / target line through the mean -->
  <line x1="150" y1="126" x2="150" y2="242" stroke="#ffd98a" stroke-width="4" stroke-dasharray="8 7"/>

  <!-- sampled observations along the baseline -->
  <g fill="#ffffff">
    <circle cx="96" cy="236" r="5"/>
    <circle cx="123" cy="236" r="5"/>
    <circle cx="150" cy="236" r="6"/>
    <circle cx="177" cy="236" r="5"/>
    <circle cx="204" cy="236" r="5"/>
  </g>

  <!-- wordmark -->
  <text x="150" y="302" text-anchor="middle" font-family="DejaVu Sans, Verdana, Arial, sans-serif"
        font-size="48" font-weight="700" fill="#ffffff" letter-spacing="1.5">pilotr</text>
</svg>
