site_name: pilotr (Python)
site_description: Simulate experimental and behavioural data from a portable design specification.
site_url: https://pablobernabeu.github.io/pilotr/py/
repo_url: https://github.com/pablobernabeu/pilotr
docs_dir: docs
copyright: Developed by <a href="https://orcid.org/0000-0003-1083-2460">Pablo Bernabeu</a>

theme:
  name: material
  custom_dir: overrides
  logo: assets/logo.svg
  favicon: assets/favicon.png
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight

extra_css:
  - stylesheets/brand.css

nav:
  - Home: index.md
  - Live demo (no-code app): https://pablobernabeu.github.io/pilotr/demo/
  - Cross-language reproducibility: cross-language.md
  - Power and design analysis: power.md
  - Response families: families.md
  - Worked examples: examples.md
  - Specification format: specification.md
  - API reference: api.md
  - Changelog: changelog.md
  - About: about.md

plugins:
  - search
  - markdown-exec
  - mkdocstrings:
      handlers:
        python:
          paths: ["."]
          options:
            docstring_style: numpy
            show_source: false
            show_root_heading: true
            show_signature_annotations: true
            separate_signature: true
            members_order: source

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.snippets:
      base_path: [".", ".."]
      check_paths: true
