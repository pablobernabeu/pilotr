site_name: pilotr (Python)
site_description: Simulate experimental and behavioural data from a portable design specification.
site_url: https://pablobernabeu.github.io/pilotr/py/
repo_url: https://github.com/pablobernabeu/pilotr
docs_dir: docs
# The licence link is absolute: the copyright line renders on every page, and a
# relative link would resolve against nested pages and break.
copyright: >-
  <span class="mrd-footer-badges">
  <a href="https://github.com/pablobernabeu/pilotr/actions/workflows/python-tests.yml"><img src="https://github.com/pablobernabeu/pilotr/actions/workflows/python-tests.yml/badge.svg" alt="python-tests"></a>
  <a href="https://lifecycle.r-lib.org/articles/stages.html#experimental"><img src="https://img.shields.io/badge/lifecycle-experimental-orange.svg" alt="Lifecycle: experimental"></a>
  <a href="https://opensource.org/license/MIT"><img src="https://img.shields.io/badge/license-MIT-blue.svg" alt="License: MIT"></a>
  </span>
  Developed by <a href="https://pablobernabeu.github.io">Pablo Bernabeu</a> ·
  Released under the
  <a href="https://pablobernabeu.github.io/pilotr/py/licence/">MIT licence</a>

theme:
  name: material
  custom_dir: overrides
  logo: assets/logo.svg
  favicon: assets/favicon.png
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight

extra_css:
  - stylesheets/brand.css

# The app is reached through the header App pill (overrides/partials/header.html),
# matching the family convention, so it does not repeat in the nav.
nav:
  - Home: index.md
  - Guides:
      - Cross-language reproducibility: cross-language.md
      - Power and design analysis: power.md
      - Response families: families.md
      - Worked examples: examples.md
      - Specification format: specification.md
  - API reference: api.md
  - Changelog: changelog.md
  - About: about.md

plugins:
  - search
  - markdown-exec
  - mkdocstrings:
      handlers:
        python:
          paths: ["."]
          options:
            docstring_style: numpy
            show_source: false
            show_root_heading: true
            show_signature_annotations: true
            separate_signature: true
            members_order: source

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.snippets:
      base_path: [".", ".."]
      check_paths: true

# The released version shown beside the title in the header (updated on release).
extra:
  version: "0.2.0"
