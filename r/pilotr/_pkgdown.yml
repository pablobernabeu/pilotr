url: https://pablobernabeu.github.io/pilotr

authors:
  Pablo Bernabeu:
    href: https://pablobernabeu.github.io

template:
  bootstrap: 5
  light-switch: true
  bslib:
    primary: "#2C6FB0"
  includes:
    in_header: |
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Spectral:ital,wght@0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

navbar:
  # House order: Get started, Reference, Articles, Changelog, About on the left;
  # search, light/dark switch, live demo and GitHub on the right.
  structure:
    left:  [intro, reference, articles, news, about]
    right: [search, lightswitch, demo, github]
  components:
    intro:
      text: Get started
      href: articles/getting-started.html
    articles:
      text: Articles
      menu:
      - text: Getting started with pilotr
        href: articles/getting-started.html
      - text: Power and design analysis
        href: articles/power-analysis.html
      - text: Precision and ROPE design analysis
        href: articles/precision-rope.html
      - text: Response families
        href: articles/response-families.html
      - text: Cross-language reproducibility
        href: articles/cross-language.html
      - text: The no-code app
        href: articles/the-no-code-app.html
    about:
      text: About
      href: articles/about.html
    demo:
      text: "Live demo"
      href: https://pablobernabeu.github.io/pilotr/demo/
    github:
      icon: fa-github
      href: https://github.com/pablobernabeu/pilotr
      aria-label: GitHub

home:
  sidebar:
    # Slim the right sidebar: the licence is one British-spelled link (the
    # default "MIT + file LICENSE" line also points at a stub the deploy prunes),
    # Community shows only the contributing guide, and the citation points at the
    # About page rather than pkgdown's authors.html#citation.
    structure: [links, license, community, citation, authors, dev]
    components:
      license:
        title: Licence
        text: >
          [MIT licence](LICENSE.html)
      community:
        title: Community
        text: >
          [Contributing guide](CONTRIBUTING.html)
      citation:
        title: Citation
        text: >
          [How to cite pilotr](articles/about.html)

footer:
  structure:
    left: [developed_by]
    right: [legal, built_with]
  components:
    developed_by: >
      Developed by [Pablo Bernabeu](https://pablobernabeu.github.io). Open,
      reproducible research software in R and Python.
    legal: >
      Released under the MIT licence.
