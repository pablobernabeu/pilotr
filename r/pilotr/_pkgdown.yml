url: https://pablobernabeu.github.io/pilotr

authors:
  Pablo Bernabeu:
    href: https://pablobernabeu.github.io

template:
  bootstrap: 5
  light-switch: true
  bslib:
    primary: "#2C6FB0"
  includes:
    in_header: |
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Spectral:ital,wght@0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

navbar:
  structure:
    left:  [reference, articles, about]
    right: [search, lightswitch, demo, github]
  components:
    articles:
      text: Articles
      menu:
      - text: Getting started with pilotr
        href: articles/getting-started.html
      - text: Power and design analysis
        href: articles/power-analysis.html
      - text: Precision and ROPE design analysis
        href: articles/precision-rope.html
      - text: Response families
        href: articles/response-families.html
      - text: Cross-language reproducibility
        href: articles/cross-language.html
      - text: The no-code app
        href: articles/the-no-code-app.html
    about:
      text: About
      href: articles/about.html
    demo:
      text: "Live demo"
      href: https://pablobernabeu.github.io/pilotr/demo/
    github:
      icon: fa-github
      href: https://github.com/pablobernabeu/pilotr
      aria-label: GitHub

home:
  sidebar:
    structure: [links, license, citation, authors, dev]
    components:
      citation:
        title: Citation
        text: See the [About page](articles/about.html) for how to cite pilotr.

footer:
  structure:
    left: [developed_by]
    right: [built_with]
  components:
    developed_by: >
      Developed by [Pablo Bernabeu](https://pablobernabeu.github.io). Open,
      reproducible research software in R and Python.
