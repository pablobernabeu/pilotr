url: https://pablobernabeu.github.io/pilotr

authors:
  Pablo Bernabeu:
    href: https://pablobernabeu.github.io

template:
  bootstrap: 5
  light-switch: true
  bslib:
    primary: "#2C6FB0"

navbar:
  structure:
    left:  [reference, articles, about]
    right: [lightswitch, demo, github]
  components:
    about:
      text: About
      href: articles/about.html
    demo:
      text: "Live demo"
      href: https://pablobernabeu.github.io/pilotr/demo/
    github:
      icon: fa-github
      href: https://github.com/pablobernabeu/pilotr
      aria-label: GitHub

home:
  sidebar:
    structure: [links, license, citation, authors, dev]
    components:
      citation:
        title: Citation
        text: See the [About page](articles/about.html) for how to cite pilotr.

# The Articles navbar menu lists only the vignettes (first section, navbar: ~). The About
# article is indexed but kept out of the navbar (a section without a navbar key); it has its
# own dedicated navbar entry instead.
articles:
- title: Articles
  navbar: ~
  contents:
  - getting-started
  - power-analysis
  - precision-rope
  - response-families
  - cross-language
  - the-no-code-app
- title: About
  contents:
  - articles/about
