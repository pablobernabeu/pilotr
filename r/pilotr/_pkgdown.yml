url: https://pablobernabeu.github.io/pilotr

# The R package lives in a subdirectory of the monorepo (r/pilotr/), not at the
# repository root. Left to auto-detect, pkgdown's per-file "Source: <path>"
# links (reference pages, articles, NEWS) resolve one level too high and 404.
# Point the source template at the package's actual subdirectory; the repo and
# issue links stay at the root, which is correct for those.
repo:
  url:
    home: https://github.com/pablobernabeu/pilotr/
    source: https://github.com/pablobernabeu/pilotr/blob/main/r/pilotr/
    issue: https://github.com/pablobernabeu/pilotr/issues/
    user: https://github.com/

authors:
  Pablo Bernabeu:
    href: https://pablobernabeu.github.io

template:
  bootstrap: 5
  light-switch: true
  bslib:
    primary: "#2C6FB0"
  includes:
    in_header: |
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Spectral:ital,wght@0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

navbar:
  # House order: Get started, Reference, Articles, Changelog, About on the left;
  # search, light/dark switch, live demo and GitHub on the right.
  structure:
    left:  [intro, reference, articles, news, about]
    right: [app, search, github, lightswitch]
  components:
    intro:
      text: Get started
      href: articles/getting-started.html
    articles:
      text: Articles
      # Ordered by workflow: simulation topics first, then power and precision
      # analysis, then the reference-like cross-language topic, app last.
      menu:
      - text: Response families
        href: articles/response-families.html
      - text: Worked examples
        href: articles/worked-examples.html
      - text: Power and design analysis
        href: articles/power-analysis.html
      - text: Precision and ROPE design analysis
        href: articles/precision-rope.html
      - text: Cross-language reproducibility
        href: articles/cross-language.html
      - text: The no-code app
        href: articles/the-no-code-app.html
    about:
      text: About
      href: articles/about.html
    app:
      text: App
      href: https://pablobernabeu.github.io/pilotr/app/
      icon: fa-play
      aria-label: The no-code app
    github:
      icon: fa-github
      href: https://github.com/pablobernabeu/pilotr
      aria-label: GitHub

home:
  sidebar:
    # Slim the right sidebar: the licence is one British-spelled link (the
    # default "MIT + file LICENSE" line also points at a stub the deploy prunes),
    # Community shows only the contributing guide, and the citation points at the
    # About page rather than pkgdown's authors.html#citation.
    structure: [links, license, community, citation, authors, dev]
    components:
      license:
        title: Licence
        text: >
          [MIT licence](LICENSE.html)
      community:
        title: Community
        text: >
          [Contributing guide](CONTRIBUTING.html)
      citation:
        title: Citation
        text: |
          [How to cite pilotr](articles/about.html)

          [![DOI](https://zenodo.org/badge/DOI/10.5281/zenodo.21266313.svg)](https://doi.org/10.5281/zenodo.21266313)

footer:
  structure:
    left: [developed_by]
    right: [legal, built_with]
  components:
    developed_by: >
      Developed by [Pablo Bernabeu](https://pablobernabeu.github.io). Open,
      reproducible research software in R and Python.
    legal: >
      Released under the [MIT licence](LICENSE.html).
